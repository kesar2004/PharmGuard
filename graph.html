                  nodes = new vis.DataSet([{"color": "#E11D48", "font": {"color": "#E0E0E0"}, "id": "Imatinib", "label": "Imatinib", "shape": "diamond", "title": "Drug"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "BCR-ABL1 fusion protein", "label": "BCR-ABL1 fusion protein", "shape": "dot", "title": "Protein Target"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "PDGFRA protein", "label": "PDGFRA protein", "shape": "dot", "title": "Protein Target"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "ABL1", "label": "ABL1", "shape": "dot", "title": "Protein Target"}, {"color": "#059669", "font": {"color": "#E0E0E0"}, "id": "Bone Marrow", "label": "Bone Marrow", "shape": "dot", "title": "Organ Expression"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "PDGFRA", "label": "PDGFRA", "shape": "dot", "title": "Protein Target"}, {"color": "#059669", "font": {"color": "#E0E0E0"}, "id": "Heart", "label": "Heart", "shape": "dot", "title": "Organ Expression"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "KIT", "label": "KIT", "shape": "dot", "title": "Protein Target"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "CSF1R", "label": "CSF1R", "shape": "dot", "title": "Protein Target"}, {"color": "#2563EB", "font": {"color": "#E0E0E0"}, "id": "PDGFRB", "label": "PDGFRB", "shape": "dot", "title": "Protein Target"}]);
